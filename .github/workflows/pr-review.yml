name: PR Code Review

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Configure OpenCode for OpenRouter
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.json << 'JSONEOF'
          {
            "provider": {
              "openrouter": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "OpenRouter",
                "options": {
                  "baseURL": "https://openrouter.ai/api/v1",
                  "apiKey": "{env:OPENROUTER_API_KEY}",
                  "headers": {
                    "HTTP-Referer": "https://github.com/DomEscobar/PR-reviewer-Example",
                    "X-Title": "PR Reviewer"
                  }
                }
              }
            },
            "model": "openrouter/${{ secrets.OPENCODE_MODEL || 'anthropic/claude-3.5-sonnet' }}"
          }
          JSONEOF

      - name: Run OpenCode Review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}
          
          # Extract prompt
          PROMPT=$(echo '${{ github.event.comment.body }}' | sed 's/^\/oc\s*//' | sed 's/^\/opencode\s*//')
          
          # Run opencode
          OUTPUT=$(opencode run "$PROMPT" 2>&1) || true
          
          # Build JSON properly with jq
          {
            echo "## 🤖 Code Review"
            echo ""
            echo "$OUTPUT"
          } | jq -Rs '{body: .}' > /tmp/comment.json
          
          # Post comment
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --input /tmp/comment.json