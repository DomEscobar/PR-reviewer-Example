name: PR Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    # Only run on PR comments starting with /review or /oc
    if: |
      github.event.issue.pull_request &&
      (
        startsWith(github.event.comment.body, '/review') ||
        startsWith(github.event.comment.body, '/oc')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          npm install -g opencode
          npm install -g commander chalk ora
          
          # Copy CLI to runner and install
          cp -r ${{ github.workspace }}/.github/pr-reviewer /tmp/pr-reviewer
          cd /tmp/pr-reviewer && npm install && npm link

      - name: Configure OpenCode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/settings.yaml << 'EOF'
          model: ${{ secrets.OPENCODE_MODEL || 'openrouter/anthropic/claude-3.5-sonnet' }}
          provider: openrouter
          providers:
            openrouter:
              apiKey: ${OPENROUTER_API_KEY}
              baseURL: https://openrouter.ai/api/v1
          EOF

      - name: Add Processing Reaction
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -F content="eyes" || true

      - name: Check Author Permission
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.comment.user.login }}"
          PERM=$(gh api repos/${{ github.repository }}/collaborators/$AUTHOR/permission \
            --jq '.permission')
          
          if [[ "$PERM" != "admin" && "$PERM" != "write" && "$PERM" != "maintain" ]]; then
            echo "::warning::User $AUTHOR lacks write permission ($PERM)"
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
              -F content="-1" || true
            exit 1
          fi

      - name: Run Code Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract custom prompt from comment (optional)
          PROMPT=$(echo '${{ github.event.comment.body }}' | sed 's/^\/review\s*//' | sed 's/^\/oc\s*//')
          
          if [ -n "$PROMPT" ] && [ "$PROMPT" != "review this" ]; then
            pr-reviewer review \
              --platform github \
              --pr ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --prompt "$PROMPT"
          else
            pr-reviewer review \
              --platform github \
              --pr ${{ github.event.issue.number }} \
              --repo ${{ github.repository }}
          fi

      - name: Add Success Reaction
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -F content="rocket" || true

      - name: Add Failure Reaction
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -F content="confused" || true
