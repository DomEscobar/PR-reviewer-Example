name: PR Code Review

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: ${{ secrets.OPENCODE_MODEL || 'anthropic/claude-3.5-sonnet' }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}
          
          # Extract prompt from comment
          PROMPT=$(echo '${{ github.event.comment.body }}' | sed 's/^\/oc\s*//' | sed 's/^\/opencode\s*//')
          
          # Get PR diff
          gh pr diff $PR_NUMBER --repo $REPO > /tmp/pr_diff.txt
          
          # Build JSON request with jq
          jq -n \
            --arg model "$MODEL" \
            --arg diff "$(cat /tmp/pr_diff.txt)" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [
                {role: "system", content: "You are a code reviewer. Provide actionable, concise feedback on PR diffs."},
                {role: "user", content: "Review this PR diff and provide feedback. Focus on bugs, security, and code quality.\n\nUser request: \($prompt)\n\nDiff:\n```diff\n\($diff)\n```"}
              ]
            }' > /tmp/review_request.json
          
          # Call OpenRouter API
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/$REPO" \
            -d @/tmp/review_request.json)
          
          # Extract review content
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: " + (.error.message // "Unknown error")')
          
          # Post comment
          echo "$REVIEW" | jq -Rs '{body: ("## 🤖 Code Review\n\n" + .)}' > /tmp/comment.json
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --input /tmp/comment.json