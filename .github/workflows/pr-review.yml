name: PR Code Review

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Configure OpenCode
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/settings.yaml << EOF
          model: ${{ secrets.OPENCODE_MODEL || 'anthropic/claude-3.5-sonnet' }}
          provider: openrouter
          EOF

      - name: Run OpenCode Review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          REPO=${{ github.repository }}
          
          # Extract prompt
          PROMPT=$(echo '${{ github.event.comment.body }}' | sed 's/^\/oc\s*//' | sed 's/^\/opencode\s*//')
          
          # Run opencode
          OUTPUT=$(opencode run "$PROMPT" 2>&1) || true
          
          # Build JSON properly with jq - raw slurp then wrap in object
          {
            echo "## 🤖 Code Review"
            echo ""
            echo "$OUTPUT"
          } | jq -Rs '{body: .}' > /tmp/comment.json
          
          # Post comment
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --input /tmp/comment.json